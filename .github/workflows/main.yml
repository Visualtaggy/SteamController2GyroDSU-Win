name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config libhidapi-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sc2gyrodsu
          path: |
            build/sc2gyrodsu
            install.sh
            sc2gyrodsu.service
