name: Build and Release
on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write   # required to upload assets to a release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ pkg-config \
            libhidapi-dev \
            libudev-dev \
            qt6-base-dev libgl1-mesa-dev \
            python3-pil \
            zip

      - name: Build
        run: |
          # SC2_STATIC_HIDAPI=ON links libhidapi-hidraw.a statically so the
          # released binary runs on Steam Deck (SteamOS/Arch), Bazzite (Fedora),
          # and generic Linux without needing libhidapi-hidraw installed.
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DSC2_STATIC_HIDAPI=ON
          cmake --build build --parallel

      - name: Package
        run: |
          mkdir -p SteamControllerGyroDSUSetup

          # Daemon (required)
          cp build/sc2gyrodsu SteamControllerGyroDSUSetup/SteamControllerGyroDSU

          # GUI config tool (if Qt6 was found and built)
          if [ -f build/sc2gyrodsu-config ]; then
            cp build/sc2gyrodsu-config SteamControllerGyroDSUSetup/sc2gyrodsu-config
          fi

          # Scripts and supporting files
          cp install.sh                              SteamControllerGyroDSUSetup/
          cp uninstall.sh                            SteamControllerGyroDSUSetup/
          cp update.sh                               SteamControllerGyroDSUSetup/
          cp 99-sc2gyrodsu.rules                     SteamControllerGyroDSUSetup/
          cp sc2gyrodsu.service                      SteamControllerGyroDSUSetup/SteamControllerGyroDSU.service
          cp SteamControllerGyroDSU.desktop          SteamControllerGyroDSUSetup/
          cp uninstall-steamcontrollergyrodsu.desktop SteamControllerGyroDSUSetup/

          # Application icon — 512 px master + downscaled PNG sizes for XDG
          cp assets/icons/sc2gyrodsu.png SteamControllerGyroDSUSetup/
          python3 - << 'PYEOF'
from PIL import Image
src = Image.open("assets/icons/sc2gyrodsu.png")
for size in (16, 32, 48, 128, 256):
    src.resize((size, size), Image.LANCZOS).save(
        f"SteamControllerGyroDSUSetup/sc2gyrodsu_{size}.png")
PYEOF

          zip -r SteamControllerGyroDSUSetup.zip SteamControllerGyroDSUSetup/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamControllerGyroDSU
          path: SteamControllerGyroDSUSetup.zip

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SteamControllerGyroDSUSetup.zip
            SteamControllerGyroDSU.desktop
